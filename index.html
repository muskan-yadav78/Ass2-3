<!DOCTYPE html>
<html>
<head>
    <title>Book Manager 📚</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 8px 12px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h1>📚 Book Manager</h1>

<div class="container">

    <!-- Add Book -->
    <div class="card">
        <h3>Add Book</h3>
        <input id="title" placeholder="Book Title">
        <input id="author" placeholder="Author">
        <button onclick="addBook()">Add</button>
    </div>

    <!-- View Books -->
    <div class="card">
        <h3>All Books</h3>
        <button onclick="getBooks()">Refresh</button>
        <div id="books"></div>
    </div>

</div>

<script>
const API = "http://localhost:3000/books";
async function deleteBook(id) {
    await fetch(API + '/' + id, {
        method: 'DELETE'
    });

    getBooks(); // refresh list
}

// GET books
async function getBooks() {
    const res = await fetch(API);
    const data = await res.json();

    const container = document.getElementById("books");
    container.innerHTML = "";

    data.forEach(book => {
        container.innerHTML += `
    <div class="card">
        <b>${book.title}</b><br>
        Author: ${book.author}<br><br>
        <button onclick="deleteBook(${book.id})" style="background:red;">
            Delete
        </button>
    </div>
`;
    });
}

// POST book
async function addBook() {
    const title = document.getElementById("title").value;
    const author = document.getElementById("author").value;

    await fetch(API, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ title, author })
    });

    getBooks();
}
</script>

</body>
</html>
